<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monetra - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(180deg, #451a03 0%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
    }
    h1 {
      color: #fbbf24;
      font-size: 28px;
      margin-bottom: 12px;
    }
    p {
      color: #fef3c7;
      font-size: 16px;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin-bottom: 24px;
      opacity: 0.7;
    }
    button {
      background: linear-gradient(90deg, #f59e0b 0%, #f97316 100%);
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/logo-small.svg" alt="Monetra" class="logo">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2">
      <path d="M18.364 5.636a9 9 0 010 12.728M5.636 18.364a9 9 0 010-12.728M8.464 15.536a5 5 0 010-7.072M15.536 8.464a5 5 0 010 7.072M12 12h.01"/>
    </svg>
    <h1>Você está offline</h1>
    <p>
      Não foi possível conectar à internet. 
      Verifique sua conexão e tente novamente.
    </p>
    <button onclick="window.location.reload()">
      Tentar Novamente
    </button>
  </div>
</body>
</html>
